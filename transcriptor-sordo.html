<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Escúchame — Transcriptor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --bg2: #111118;
    --bg3: #18181f;
    --surface: #1e1e28;
    --surface2: #252532;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.13);
    --accent: #6c63ff;
    --accent2: #8b84ff;
    --accent-dim: rgba(108,99,255,0.15);
    --accent-glow: rgba(108,99,255,0.35);
    --text: #f0f0f8;
    --text2: #9090a8;
    --text3: #5a5a72;
    --green: #3dffa0;
    --green-dim: rgba(61,255,160,0.12);
    --red: #ff5f7e;
    --red-dim: rgba(255,95,126,0.12);
    --amber: #ffc85a;
    --font: 'DM Sans', sans-serif;
    --mono: 'DM Mono', monospace;
    --radius: 14px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    overflow: hidden;
  }

  /* ─── GRAIN OVERLAY ─── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 999;
    opacity: 0.4;
  }

  /* ─── LAYOUT ─── */
  .app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    height: 100dvh;
    max-width: 480px;
    margin: 0 auto;
    position: relative;
  }

  /* ─── TOP BAR ─── */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px 10px;
    flex-shrink: 0;
    border-bottom: 0.5px solid var(--border);
    background: var(--bg);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 9px;
  }

  .logo-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 10px var(--accent-glow);
    transition: all 0.3s;
  }

  .logo-dot.active {
    background: var(--green);
    box-shadow: 0 0 14px rgba(61,255,160,0.5);
    animation: breathe 1.8s infinite;
  }

  @keyframes breathe {
    0%,100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.3); opacity: 0.7; }
  }

  .logo-name {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: -0.3px;
    color: var(--text);
  }

  .logo-name span { color: var(--accent2); }

  .topbar-actions {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .icon-btn {
    width: 34px;
    height: 34px;
    border-radius: var(--radius-sm);
    border: 0.5px solid var(--border2);
    background: var(--surface);
    color: var(--text2);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    transition: all 0.2s;
    position: relative;
  }

  .icon-btn:hover { background: var(--surface2); color: var(--text); }
  .icon-btn.active { background: var(--accent-dim); color: var(--accent2); border-color: rgba(108,99,255,0.3); }

  /* ─── SETTINGS PANEL ─── */
  .settings-panel {
    background: var(--bg2);
    border-bottom: 0.5px solid var(--border);
    padding: 0 18px;
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.35s ease, padding 0.35s ease;
    flex-shrink: 0;
  }

  .settings-panel.open {
    max-height: 200px;
    padding: 14px 18px;
  }

  .settings-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .setting-item {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .setting-label {
    font-size: 11px;
    font-weight: 500;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.6px;
  }

  .setting-item select,
  .setting-item input[type=range] {
    width: 100%;
    background: var(--surface);
    border: 0.5px solid var(--border2);
    color: var(--text);
    border-radius: var(--radius-sm);
    padding: 7px 10px;
    font-family: var(--font);
    font-size: 13px;
    outline: none;
    -webkit-appearance: none;
    appearance: none;
  }

  .setting-item select option { background: var(--bg3); }

  input[type=range] {
    height: 36px;
    padding: 0 10px !important;
    cursor: pointer;
    accent-color: var(--accent);
  }

  .font-size-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 12px;
    grid-column: 1 / -1;
  }

  .font-size-row label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.6px; white-space: nowrap; }

  /* ─── SPEAKER BADGES ─── */
  .speaker-toggle-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 10px;
    grid-column: 1 / -1;
  }

  .spk-badge {
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 500;
    border: 0.5px solid;
    cursor: pointer;
    transition: all 0.2s;
    font-family: var(--font);
  }

  /* ─── STATUS BAR ─── */
  .statusbar {
    padding: 8px 18px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
    font-size: 12px;
    color: var(--text3);
    font-family: var(--mono);
    letter-spacing: 0.2px;
    min-height: 36px;
  }

  .status-chip {
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 500;
    border: 0.5px solid var(--border);
    background: var(--surface);
    color: var(--text3);
    transition: all 0.3s;
  }

  .status-chip.listening {
    background: var(--green-dim);
    border-color: rgba(61,255,160,0.25);
    color: var(--green);
  }

  /* ─── TRANSCRIPT AREA ─── */
  .transcript-area {
    flex: 1;
    overflow-y: auto;
    padding: 16px 18px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    scroll-behavior: smooth;
  }

  .transcript-area::-webkit-scrollbar { width: 3px; }
  .transcript-area::-webkit-scrollbar-track { background: transparent; }
  .transcript-area::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  /* ─── EMPTY STATE ─── */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    gap: 12px;
    padding: 40px 20px;
    text-align: center;
    color: var(--text3);
    animation: fadeIn 0.4s ease;
  }

  .empty-icon {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    border: 1px solid var(--border2);
    background: var(--surface);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
    margin-bottom: 4px;
  }

  .empty-state h2 { font-size: 17px; font-weight: 500; color: var(--text2); }
  .empty-state p { font-size: 13px; line-height: 1.6; max-width: 240px; }

  /* ─── BUBBLES ─── */
  .bubble {
    max-width: 100%;
    animation: slideUp 0.2s ease-out;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  .bubble-inner {
    padding: 12px 16px;
    border-radius: var(--radius);
    border: 0.5px solid var(--border);
    background: var(--surface);
    line-height: 1.55;
    position: relative;
  }

  .bubble-spk {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    margin-bottom: 5px;
    font-family: var(--mono);
  }

  .bubble-text {
    font-size: 20px;
    color: var(--text);
    font-weight: 400;
  }

  .bubble-time {
    font-size: 10px;
    color: var(--text3);
    font-family: var(--mono);
    margin-top: 6px;
    text-align: right;
  }

  /* Speaker colors */
  .spk-0 .bubble-inner { border-left: 3px solid var(--accent); }
  .spk-0 .bubble-spk { color: var(--accent2); }
  .spk-1 .bubble-inner { border-left: 3px solid var(--green); }
  .spk-1 .bubble-spk { color: var(--green); }
  .spk-2 .bubble-inner { border-left: 3px solid var(--amber); }
  .spk-2 .bubble-spk { color: var(--amber); }
  .spk-3 .bubble-inner { border-left: 3px solid var(--red); }
  .spk-3 .bubble-spk { color: var(--red); }

  /* Interim bubble */
  .bubble-interim .bubble-inner {
    background: var(--bg3);
    border-style: dashed;
    border-color: var(--border2);
  }

  .bubble-interim .bubble-text {
    color: var(--text3);
    font-style: italic;
  }

  /* ─── BOTTOM CONTROLS ─── */
  .bottom-controls {
    flex-shrink: 0;
    padding: 14px 18px 20px;
    background: linear-gradient(to top, var(--bg) 80%, transparent);
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  /* Waveform */
  .waveform {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 3px;
    height: 28px;
    opacity: 0;
    transition: opacity 0.4s;
  }

  .waveform.active { opacity: 1; }

  .wave-bar {
    width: 3px;
    border-radius: 2px;
    background: var(--accent2);
    height: 4px;
    transition: height 0.15s ease;
  }

  /* Main button row */
  .btn-row {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .btn-mic {
    flex: 1;
    height: 56px;
    border-radius: var(--radius);
    border: none;
    cursor: pointer;
    font-family: var(--font);
    font-size: 16px;
    font-weight: 600;
    letter-spacing: -0.2px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    position: relative;
    overflow: hidden;
    background: var(--accent);
    color: #fff;
  }

  .btn-mic::before {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0.08);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .btn-mic:hover::before { opacity: 1; }
  .btn-mic:active { transform: scale(0.97); }

  .btn-mic.recording {
    background: var(--red);
    box-shadow: 0 0 24px rgba(255,95,126,0.35);
    animation: recPulse 2s infinite;
  }

  @keyframes recPulse {
    0%,100% { box-shadow: 0 0 24px rgba(255,95,126,0.35); }
    50% { box-shadow: 0 0 40px rgba(255,95,126,0.55); }
  }

  .btn-icon { font-size: 22px; line-height: 1; }

  .btn-sm {
    width: 56px;
    height: 56px;
    border-radius: var(--radius);
    border: 0.5px solid var(--border2);
    background: var(--surface);
    color: var(--text2);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .btn-sm:hover { background: var(--surface2); color: var(--text); }
  .btn-sm:active { transform: scale(0.95); }

  /* Speaker switch row */
  .speaker-row {
    display: flex;
    gap: 8px;
    justify-content: center;
  }

  .spk-btn {
    flex: 1;
    height: 34px;
    border-radius: var(--radius-sm);
    border: 0.5px solid var(--border2);
    background: var(--surface);
    color: var(--text3);
    cursor: pointer;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.3px;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
  }

  .spk-btn .spk-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .spk-btn.active-spk { background: var(--surface2); color: var(--text); border-color: var(--border2); }

  /* ─── ERROR TOAST ─── */
  .toast {
    position: fixed;
    bottom: 120px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--red-dim);
    border: 0.5px solid rgba(255,95,126,0.3);
    color: var(--red);
    padding: 10px 18px;
    border-radius: 30px;
    font-size: 13px;
    font-weight: 500;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    white-space: nowrap;
    max-width: 90vw;
    text-align: center;
    z-index: 100;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ─── HISTORY MODAL ─── */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
    z-index: 200;
    display: flex;
    align-items: flex-end;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }

  .modal-backdrop.open {
    opacity: 1;
    pointer-events: all;
  }

  .modal {
    background: var(--bg2);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius) var(--radius) 0 0;
    width: 100%;
    max-height: 70vh;
    overflow-y: auto;
    padding: 20px 18px 30px;
    transform: translateY(100%);
    transition: transform 0.35s cubic-bezier(0.34, 1.2, 0.64, 1);
  }

  .modal-backdrop.open .modal {
    transform: translateY(0);
  }

  .modal-handle {
    width: 36px;
    height: 4px;
    border-radius: 2px;
    background: var(--border2);
    margin: 0 auto 16px;
  }

  .modal-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .history-session {
    padding: 12px 0;
    border-bottom: 0.5px solid var(--border);
  }

  .history-session:last-child { border-bottom: none; }

  .history-date {
    font-size: 11px;
    color: var(--text3);
    font-family: var(--mono);
    margin-bottom: 5px;
  }

  .history-preview {
    font-size: 14px;
    color: var(--text2);
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .history-restore {
    margin-top: 8px;
    font-size: 12px;
    color: var(--accent2);
    background: none;
    border: none;
    cursor: pointer;
    font-family: var(--font);
    padding: 0;
  }

  .history-empty {
    color: var(--text3);
    font-size: 14px;
    text-align: center;
    padding: 30px 0;
  }

  /* ─── COPY FEEDBACK ─── */
  .copy-flash {
    position: fixed;
    top: 60px;
    right: 18px;
    background: var(--green-dim);
    border: 0.5px solid rgba(61,255,160,0.25);
    color: var(--green);
    padding: 7px 14px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 500;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
    z-index: 101;
  }

  .copy-flash.show { opacity: 1; }

</style>
</head>
<body>

<div class="app">

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="logo">
      <div class="logo-dot" id="logoDot"></div>
      <div class="logo-name">Escúcha<span>me</span></div>
    </div>
    <div class="topbar-actions">
      <button class="icon-btn" id="historyBtn" title="Historial" onclick="openHistory()">🕐</button>
      <button class="icon-btn" id="copyBtn" title="Copiar todo" onclick="copyAll()">📋</button>
      <button class="icon-btn" id="settingsBtn" title="Configuración" onclick="toggleSettings()">⚙️</button>
    </div>
  </div>

  <!-- SETTINGS PANEL -->
  <div class="settings-panel" id="settingsPanel">
    <div class="settings-grid">
      <div class="setting-item">
        <span class="setting-label">Idioma</span>
        <select id="langSelect" onchange="onLangChange()">
          <option value="es-ES" selected>Español (España)</option>
          <option value="es-MX">Español (México)</option>
          <option value="es-AR">Español (Argentina)</option>
          <option value="es-CO">Español (Colombia)</option>
          <option value="en-US">English (US)</option>
          <option value="en-GB">English (UK)</option>
          <option value="pt-BR">Português</option>
          <option value="fr-FR">Français</option>
        </select>
      </div>
      <div class="setting-item">
        <span class="setting-label">Hablantes</span>
        <select id="speakerCount" onchange="updateSpeakers()">
          <option value="1">1 persona</option>
          <option value="2" selected>2 personas</option>
          <option value="3">3 personas</option>
          <option value="4">4 personas</option>
        </select>
      </div>
      <div class="font-size-row setting-item" style="flex-direction:row; align-items:center; gap:12px;">
        <span class="setting-label" style="white-space:nowrap">Tamaño de texto</span>
        <input type="range" id="fontRange" min="14" max="36" value="20" step="1" oninput="changeFontSize(this.value)" style="flex:1;">
        <span id="fontVal" style="font-size:12px; color:var(--text3); font-family:var(--mono); min-width:28px; text-align:right;">20px</span>
      </div>
    </div>
  </div>

  <!-- STATUS -->
  <div class="statusbar">
    <div class="status-chip" id="statusChip">En espera</div>
    <span id="statusMsg" style="color:var(--text3); font-size:11px;"></span>
  </div>

  <!-- TRANSCRIPT -->
  <div class="transcript-area" id="transcriptArea">
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">👋</div>
      <h2>Listo para escuchar</h2>
      <p>Presiona el botón rojo para comenzar. El texto aparecerá aquí en tiempo real mientras hablen.</p>
    </div>
  </div>

  <!-- BOTTOM -->
  <div class="bottom-controls">
    <!-- Waveform animation -->
    <div class="waveform" id="waveform">
      <div class="wave-bar" id="w0"></div>
      <div class="wave-bar" id="w1"></div>
      <div class="wave-bar" id="w2"></div>
      <div class="wave-bar" id="w3"></div>
      <div class="wave-bar" id="w4"></div>
      <div class="wave-bar" id="w5"></div>
      <div class="wave-bar" id="w6"></div>
      <div class="wave-bar" id="w7"></div>
      <div class="wave-bar" id="w8"></div>
      <div class="wave-bar" id="w9"></div>
      <div class="wave-bar" id="w10"></div>
      <div class="wave-bar" id="w11"></div>
    </div>

    <!-- Speaker selector -->
    <div class="speaker-row" id="speakerRow"></div>

    <!-- Main buttons -->
    <div class="btn-row">
      <button class="btn-sm" title="Guardar y limpiar" onclick="saveAndClear()">🗑️</button>
      <button class="btn-mic" id="micBtn" onclick="toggleRecording()">
        <span class="btn-icon" id="micIcon">🎙️</span>
        <span id="micLabel">Iniciar</span>
      </button>
      <button class="btn-sm" title="Pausar / hablante siguiente" onclick="nextSpeaker()" id="nextSpkBtn" style="font-size:17px; font-family:var(--mono)">→</button>
    </div>
  </div>

</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- COPY FLASH -->
<div class="copy-flash" id="copyFlash">✓ Copiado</div>

<!-- HISTORY MODAL -->
<div class="modal-backdrop" id="historyModal" onclick="closeHistoryIfBackdrop(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">
      <span>Historial de conversaciones</span>
      <button onclick="closeHistory()" style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:18px;">✕</button>
    </div>
    <div id="historyList"></div>
  </div>
</div>

<script>
// ── STATE ──────────────────────────────────────────────────
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition = null;
let isListening  = false;
let currentSpeaker = 0;
let numSpeakers  = 2;
let fontSize     = 20;
let interimEl    = null;
let waveInterval = null;
let transcriptLog = []; // {speaker, text, time}

const SPEAKER_COLORS = [
  { css: 'var(--accent2)', hex: '#8b84ff', name: 'Persona 1' },
  { css: 'var(--green)',   hex: '#3dffa0', name: 'Persona 2' },
  { css: 'var(--amber)',   hex: '#ffc85a', name: 'Persona 3' },
  { css: 'var(--red)',     hex: '#ff5f7e', name: 'Persona 4' },
];

// Load from storage
let history = JSON.parse(localStorage.getItem('escuchame-history') || '[]');

// ── INIT ───────────────────────────────────────────────────
function init() {
  updateSpeakers();
  if (!SR) {
    showToast('Usa Chrome en Android para el reconocimiento de voz');
  }
}

// ── SPEAKERS ───────────────────────────────────────────────
function updateSpeakers() {
  numSpeakers = parseInt(document.getElementById('speakerCount').value);
  if (currentSpeaker >= numSpeakers) currentSpeaker = 0;
  renderSpeakerRow();
}

function renderSpeakerRow() {
  const row = document.getElementById('speakerRow');
  row.innerHTML = '';
  for (let i = 0; i < numSpeakers; i++) {
    const btn = document.createElement('button');
    btn.className = 'spk-btn' + (i === currentSpeaker ? ' active-spk' : '');
    btn.onclick = () => switchSpeaker(i);
    btn.innerHTML = `<span class="spk-dot" style="background:${SPEAKER_COLORS[i].hex}"></span>${SPEAKER_COLORS[i].name}`;
    row.appendChild(btn);
  }
}

function switchSpeaker(i) {
  currentSpeaker = i;
  renderSpeakerRow();
  if (isListening && interimEl) { interimEl.remove(); interimEl = null; }
}

function nextSpeaker() {
  switchSpeaker((currentSpeaker + 1) % numSpeakers);
}

// ── RECORDING ─────────────────────────────────────────────
function toggleRecording() {
  if (!SR) { showToast('Tu navegador no soporta reconocimiento de voz'); return; }
  if (!isListening) startRecording();
  else stopRecording();
}

function startRecording() {
  recognition = new SR();
  recognition.continuous     = true;
  recognition.interimResults = true;
  recognition.lang           = document.getElementById('langSelect').value;
  recognition.maxAlternatives = 1;

  recognition.onstart = () => {
    isListening = true;
    document.getElementById('micBtn').classList.add('recording');
    document.getElementById('micIcon').textContent = '⏹';
    document.getElementById('micLabel').textContent = 'Detener';
    document.getElementById('logoDot').classList.add('active');
    document.getElementById('statusChip').textContent = 'Escuchando';
    document.getElementById('statusChip').classList.add('listening');
    document.getElementById('statusMsg').textContent = SPEAKER_COLORS[currentSpeaker].name + ' hablando';
    startWave();
    hideEmpty();
  };

  recognition.onend = () => {
    if (isListening) {
      try { recognition.start(); } catch(e) {}
    } else {
      onStop();
    }
  };

  recognition.onerror = (e) => {
    if (e.error === 'no-speech') return;
    if (e.error === 'not-allowed') showToast('Permiso de micrófono denegado — ve a ajustes de Chrome');
    else if (e.error === 'audio-capture') showToast('No se detectó micrófono');
    else showToast('Error: ' + e.error);
    isListening = false;
    onStop();
  };

  recognition.onresult = (e) => {
    let interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const res = e.results[i];
      if (res.isFinal) {
        commitBubble(res[0].transcript.trim());
        interim = '';
      } else {
        interim += res[0].transcript;
      }
    }
    if (interim) showInterim(interim);
  };

  isListening = true;
  try { recognition.start(); }
  catch(e) { showToast('No se pudo iniciar el micrófono'); isListening = false; }
}

function stopRecording() {
  isListening = false;
  if (recognition) { try { recognition.stop(); } catch(e) {} }
  if (interimEl) { interimEl.remove(); interimEl = null; }
  onStop();
}

function onStop() {
  document.getElementById('micBtn').classList.remove('recording');
  document.getElementById('micIcon').textContent = '🎙️';
  document.getElementById('micLabel').textContent = 'Iniciar';
  document.getElementById('logoDot').classList.remove('active');
  document.getElementById('statusChip').textContent = 'En espera';
  document.getElementById('statusChip').classList.remove('listening');
  document.getElementById('statusMsg').textContent = '';
  stopWave();
}

// ── BUBBLES ────────────────────────────────────────────────
function hideEmpty() {
  const e = document.getElementById('emptyState');
  if (e) e.style.display = 'none';
}

function showInterim(text) {
  const area = document.getElementById('transcriptArea');
  if (!interimEl) {
    const wrap = document.createElement('div');
    wrap.className = 'bubble spk-' + currentSpeaker + ' bubble-interim';
    wrap.innerHTML = `<div class="bubble-inner"><div class="bubble-text" id="interimText"></div></div>`;
    area.appendChild(wrap);
    interimEl = wrap;
  }
  document.getElementById('interimText').textContent = text;
  area.scrollTop = area.scrollHeight;
}

function commitBubble(text) {
  if (!text) return;
  const area = document.getElementById('transcriptArea');
  if (interimEl) { interimEl.remove(); interimEl = null; }

  const spk = currentSpeaker;
  const now  = new Date();
  const timeStr = now.toLocaleTimeString('es', { hour: '2-digit', minute: '2-digit' });

  const wrap = document.createElement('div');
  wrap.className = 'bubble spk-' + spk;
  wrap.innerHTML = `
    <div class="bubble-inner">
      <div class="bubble-spk">${SPEAKER_COLORS[spk].name}</div>
      <div class="bubble-text" style="font-size:${fontSize}px">${escHtml(text)}</div>
      <div class="bubble-time">${timeStr}</div>
    </div>`;
  area.appendChild(wrap);
  area.scrollTop = area.scrollHeight;

  transcriptLog.push({ speaker: SPEAKER_COLORS[spk].name, text, time: timeStr });
  document.getElementById('statusMsg').textContent = SPEAKER_COLORS[currentSpeaker].name + ' hablando';
}

function escHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── WAVEFORM ───────────────────────────────────────────────
function startWave() {
  const wave = document.getElementById('waveform');
  wave.classList.add('active');
  waveInterval = setInterval(() => {
    for (let i = 0; i < 12; i++) {
      const h = 4 + Math.random() * 22;
      document.getElementById('w'+i).style.height = h + 'px';
    }
  }, 120);
}

function stopWave() {
  clearInterval(waveInterval);
  const wave = document.getElementById('waveform');
  wave.classList.remove('active');
  for (let i = 0; i < 12; i++) document.getElementById('w'+i).style.height = '4px';
}

// ── SETTINGS PANEL ─────────────────────────────────────────
function toggleSettings() {
  const panel = document.getElementById('settingsPanel');
  const btn   = document.getElementById('settingsBtn');
  panel.classList.toggle('open');
  btn.classList.toggle('active');
}

function onLangChange() {
  if (isListening) { stopRecording(); showToast('Idioma cambiado — pulsa Iniciar de nuevo'); }
}

function changeFontSize(val) {
  fontSize = parseInt(val);
  document.getElementById('fontVal').textContent = val + 'px';
  document.querySelectorAll('.bubble-text').forEach(el => el.style.fontSize = val + 'px');
}

// ── COPY ───────────────────────────────────────────────────
function copyAll() {
  if (!transcriptLog.length) { showToast('No hay texto para copiar'); return; }
  const text = transcriptLog.map(e => `[${e.time}] ${e.speaker}: ${e.text}`).join('\n');
  navigator.clipboard.writeText(text).then(() => {
    const f = document.getElementById('copyFlash');
    f.classList.add('show');
    setTimeout(() => f.classList.remove('show'), 1800);
  }).catch(() => showToast('No se pudo copiar'));
}

// ── SAVE & CLEAR ───────────────────────────────────────────
function saveAndClear() {
  if (transcriptLog.length) {
    const session = {
      date: new Date().toLocaleString('es', { dateStyle: 'medium', timeStyle: 'short' }),
      entries: [...transcriptLog],
      preview: transcriptLog.slice(0,2).map(e => e.speaker+': '+e.text).join(' | ')
    };
    history.unshift(session);
    if (history.length > 20) history.pop();
    localStorage.setItem('escuchame-history', JSON.stringify(history));
  }
  transcriptLog = [];
  interimEl = null;
  const area = document.getElementById('transcriptArea');
  area.innerHTML = `<div class="empty-state" id="emptyState">
    <div class="empty-icon">👋</div>
    <h2>Listo para escuchar</h2>
    <p>Presiona el botón rojo para comenzar. El texto aparecerá aquí en tiempo real mientras hablen.</p>
  </div>`;
  showToast('Conversación guardada en historial');
}

// ── HISTORY ────────────────────────────────────────────────
function openHistory() {
  const list = document.getElementById('historyList');
  if (!history.length) {
    list.innerHTML = '<div class="history-empty">No hay conversaciones guardadas todavía.</div>';
  } else {
    list.innerHTML = history.map((s, idx) => `
      <div class="history-session">
        <div class="history-date">${s.date}</div>
        <div class="history-preview">${escHtml(s.preview)}</div>
        <button class="history-restore" onclick="restoreSession(${idx})">Ver completa →</button>
      </div>`).join('');
  }
  document.getElementById('historyModal').classList.add('open');
}

function restoreSession(idx) {
  const s = history[idx];
  closeHistory();
  const area = document.getElementById('transcriptArea');
  area.innerHTML = '';
  transcriptLog = [...s.entries];
  s.entries.forEach(e => {
    const spkIdx = SPEAKER_COLORS.findIndex(c => c.name === e.speaker);
    const si = spkIdx >= 0 ? spkIdx : 0;
    const wrap = document.createElement('div');
    wrap.className = 'bubble spk-' + si;
    wrap.innerHTML = `<div class="bubble-inner">
      <div class="bubble-spk">${escHtml(e.speaker)}</div>
      <div class="bubble-text" style="font-size:${fontSize}px">${escHtml(e.text)}</div>
      <div class="bubble-time">${e.time}</div>
    </div>`;
    area.appendChild(wrap);
  });
  area.scrollTop = area.scrollHeight;
}

function closeHistory() { document.getElementById('historyModal').classList.remove('open'); }
function closeHistoryIfBackdrop(e) { if (e.target === document.getElementById('historyModal')) closeHistory(); }

// ── TOAST ──────────────────────────────────────────────────
let toastTimer = null;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3500);
}

// ── START ──────────────────────────────────────────────────
init();
</script>
</body>
</html>
